name: CI

on:
  push:
    branches: [main, master]
  pull_request: 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Tests and coverage
        run: uv run pytest tests/ -v --tb=short -m "not benchmark" --cov=src/hedging_pipeline --cov-report=term-missing --cov-report=xml --cov-fail-under=50

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build deps
        run: uv sync

      - name: Build package
        run: uv build

  run-pipeline:
    runs-on: ubuntu-latest
    needs: test
    # Only run if data files exist (e.g. in repo or uploaded artifact)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync

      - name: Run pipeline (if data present)
        run: |
          if [ -f data/nasdaq_events.xlsx ] && [ -f data/daily_bars.parquet ]; then
            uv run run-pipeline --output-dir output
          else
            echo "Data files not found in data/; skipping pipeline run."
          fi

      - name: Upload pipeline output
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: pipeline-output
          path: output/
          if-no-files-found: ignore
