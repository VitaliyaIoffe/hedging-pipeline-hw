[loggers]
keys = root,hedging_pipeline

[handlers]
keys = console

[formatters]
keys = default

[logger_root]
level = INFO
handlers = console

[logger_hedging_pipeline]
level = DEBUG
handlers = console
qualname = hedging_pipeline
propagate = 0

[handler_console]
class = logging.StreamHandler
level = INFO
formatter = default
args = ()

[formatter_default]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
